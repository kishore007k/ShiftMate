[[services]]
  name = "api"
  source = "apps/api"
  build_command = "pnpm --filter @shiftmate/api build"
  start_command = "node dist/main.js"

  [services.variables]
    PORT = "3000"
    NODE_ENV = "production"
    DATABASE_URL = "${{Postgres.DATABASE_URL}}"
    GOOGLE_MAPS_API_KEY = "${{GOOGLE_MAPS_API_KEY}}"

[[services]]
  name = "web"
  source = "apps/web"
  build_command = "pnpm --filter @shiftmate/web build"
  start_command = "pnpm --filter @shiftmate/web start"

  [services.variables]
    PORT = "8080"
    NODE_ENV = "production"
    NEXT_PUBLIC_API_BASE_URL = "${{api.RAILWAY_PUBLIC_DOMAIN}}"
